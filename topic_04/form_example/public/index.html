<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <title>Головна сторінка - Форми</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .links {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    .links a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .links a:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <h1>Ласкаво просимо до прикладу форм</h1>
  <p>Цей приклад демонструє роботу з HTML формами та обробку даних на сервері.</p>

  <div class="links">
    <a href="/register">Реєстрація користувача</a>
    <a href="/search">Пошук користувачів</a>
  </div>
</body>

</html>
