<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-3xl flex-col px-4 py-6">
      <section class="mb-6">
        <p class="text-sm font-medium uppercase tracking-wide text-cyan-300">
          Socket.IO чат
        </p>
        <h1 class="mt-2 text-3xl font-bold">Клієнтська сторінка чату</h1>
        <p class="mt-2 text-slate-400">
          Увійдіть, оберіть кімнату і напишіть повідомлення. Сервер збереже
          текст і поверне історію кімнати.
        </p>
      </section>

      <section
        id="authPanel"
        class="mb-4 rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-2xl"
      >
        <div class="mb-4 flex gap-2">
          <button
            id="loginModeBtn"
            class="rounded-lg bg-cyan-400 px-4 py-2 font-semibold text-slate-950"
            type="button"
          >
            Вхід
          </button>
          <button
            id="registerModeBtn"
            class="rounded-lg bg-slate-800 px-4 py-2 font-semibold text-slate-200"
            type="button"
          >
            Реєстрація
          </button>
        </div>

        <form id="authForm" class="grid gap-3 sm:grid-cols-[1fr_1fr_auto]">
          <input
            id="usernameInput"
            class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-cyan-400"
            type="text"
            placeholder="Ім'я користувача"
            autocomplete="username"
            minlength="3"
            maxlength="30"
            required
          />
          <input
            id="passwordInput"
            class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-cyan-400"
            type="password"
            placeholder="Пароль"
            autocomplete="current-password"
            minlength="6"
            required
          />
          <button
            id="authSubmitBtn"
            class="rounded-lg bg-cyan-400 px-5 py-3 font-semibold text-slate-950 transition hover:bg-cyan-300"
            type="submit"
          >
            Увійти
          </button>
        </form>

        <p id="authMessage" class="mt-3 min-h-6 text-sm text-rose-300"></p>
      </section>

      <section
        id="chatPanel"
        class="flex flex-1 flex-col overflow-hidden rounded-2xl border border-slate-800 bg-slate-900 shadow-2xl"
        hidden
      >
        <div
          class="flex flex-col gap-3 border-b border-slate-800 p-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <label class="flex flex-col gap-1 text-sm text-slate-300">
            Кімната
            <select
              id="roomSelect"
              class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100 outline-none focus:border-cyan-400"
            >
              <option value="Загальний">Загальний</option>
              <option value="JavaScript">JavaScript</option>
              <option value="Python">Python</option>
            </select>
          </label>

          <div class="text-sm text-slate-400">
            <p>
              Користувач:
              <span id="currentUser" class="font-medium text-slate-100"></span>
            </p>
            <p>
              Статус:
              <span id="connectionStatus" class="font-medium text-amber-300">
                не підключено
              </span>
            </p>
            <button
              id="logoutBtn"
              class="mt-2 rounded-lg bg-slate-800 px-3 py-2 font-semibold text-slate-200 transition hover:bg-slate-700"
              type="button"
            >
              Вийти
            </button>
          </div>
        </div>

        <ul id="messages" class="flex-1 space-y-3 overflow-y-auto p-4"></ul>

        <p id="typingStatus" class="min-h-6 px-4 text-sm text-cyan-300"></p>

        <form
          id="messageForm"
          class="flex gap-3 border-t border-slate-800 p-4"
        >
          <input
            id="messageInput"
            class="flex-1 rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-cyan-400"
            type="text"
            placeholder="Введіть повідомлення"
            autocomplete="off"
          />
          <button
            id="sendBtn"
            class="rounded-lg bg-cyan-400 px-5 py-3 font-semibold text-slate-950 transition hover:bg-cyan-300"
            type="submit"
          >
            Надіслати
          </button>
        </form>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
  </body>
</html>
